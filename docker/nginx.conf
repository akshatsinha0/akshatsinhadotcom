server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/pdf;

  # Long-cache static assets (filenames are content-hashed by the Angular build).
  location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico|pdf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback: every unmatched route serves index.html so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
