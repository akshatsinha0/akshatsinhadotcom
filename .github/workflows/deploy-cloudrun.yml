name: Deploy to Cloud Run

# Container deploy on merge to main, keyless via Workload Identity Federation.
# Runs alongside the Vercel workflow (Vercel stays the primary live host).
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for WIF (GCP) and Depot OIDC

concurrency:
  group: cloud-run-production
  cancel-in-progress: true

env:
  GCP__PROJECT_ID: akshat-portfolio-499712
  GCP__REGION: asia-south1
  CLOUD_RUN__SERVICE_NAME: akshat-portfolio
  WIF__PROVIDER: projects/193137828371/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER__SA_EMAIL: gha-deployer@akshat-portfolio-499712.iam.gserviceaccount.com
  AR__REPO: cloud-run-source-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF__PROVIDER }}
          service_account: ${{ env.DEPLOYER__SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      # Build on Depot's remote builders with persistent layer caching (~10x faster
      # rebuilds), push the image to Artifact Registry, then deploy it. If Depot is
      # unavailable for any reason (e.g. trial ended), automatically fall back to
      # Cloud Build via --source, so deploys never break and need no intervention.
      - name: Build with Depot cache and deploy (fallback to Cloud Build)
        run: |
          set -uo pipefail
          IMAGE="${GCP__REGION}-docker.pkg.dev/${GCP__PROJECT_ID}/${AR__REPO}/${CLOUD_RUN__SERVICE_NAME}:${GITHUB_SHA::7}"

          echo "Authenticating Docker to Artifact Registry"
          gcloud auth print-access-token \
            | docker login -u oauth2accesstoken --password-stdin "https://${GCP__REGION}-docker.pkg.dev"

          if depot build --platform linux/amd64 -t "$IMAGE" --push . ; then
            echo "::notice::Depot build succeeded — deploying prebuilt image"
            gcloud run deploy "$CLOUD_RUN__SERVICE_NAME" \
              --image "$IMAGE" \
              --project "$GCP__PROJECT_ID" --region "$GCP__REGION" \
              --allow-unauthenticated --port 8080 --quiet
          else
            echo "::warning::Depot unavailable — falling back to Cloud Build (--source)"
            gcloud run deploy "$CLOUD_RUN__SERVICE_NAME" \
              --source . \
              --project "$GCP__PROJECT_ID" --region "$GCP__REGION" \
              --allow-unauthenticated --port 8080 --quiet
          fi
