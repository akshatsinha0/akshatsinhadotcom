<div class="loading-screen">
  <div class="top-lines">
    <div
      class="line line-1"
      [style.margin-left.%]="lineSqueeze()"
      [style.transition]="'margin-left 0.3s ease-out'"
    ></div>
    <div
      class="line line-2"
      [style.margin-left.%]="lineSqueeze()"
      [style.transition]="'margin-left 0.3s ease-out'"
    ></div>
    <div
      class="line line-3"
      [style.margin-left.%]="lineSqueeze()"
      [style.transition]="'margin-left 0.3s ease-out'"
    ></div>
    <div
      class="line line-4"
      [style.margin-left.%]="lineSqueeze()"
      [style.transition]="'margin-left 0.3s ease-out'"
    ></div>
  </div>

  <div class="vertical-line-container">
    <div class="vertical-line" [style.left.%]="lineProgress()" [style.transition]="'none'"></div>
  </div>

  <div class="loading-counter">
    <span class="counter-number">{{ counter() }}</span>
    <span class="counter-percent">%</span>
  </div>
</div>
