@switch (phase()) {
  @case ('loading') {
    <app-loading />
  }
  @case ('landing') {
    <app-landing (entered)="enterMain()" />
  }
  @default {
    <div class="app">
      <div #patch class="top-color-patch" aria-hidden="true"></div>
      <app-navigation />
      <main class="main-content">
        <div class="section-container">
          <router-outlet />
        </div>
      </main>
      <app-contact />
      <app-terminal-icon (opened)="isTerminalOpen.set(true)" />
      <app-terminal [isOpen]="isTerminalOpen()" (closed)="isTerminalOpen.set(false)" />
    </div>
  }
}
