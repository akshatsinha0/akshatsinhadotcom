<div class="mobile-nav-toggle" (click)="toggle()">
  <div class="nav-toggle-icon"><span></span><span></span><span></span></div>
</div>

<nav class="navigation" [class.expanded]="isExpanded()">
  <div class="nav-toggle" (click)="toggle()">
    <div class="nav-toggle-icon"><span></span><span></span><span></span></div>
  </div>

  <div class="nav-items">
    @for (section of sections; track section.id; let i = $index) {
      <a
        class="nav-item"
        [routerLink]="section.isGallery ? null : section.route"
        routerLinkActive="active"
        (click)="onItemClick(section)"
        [akTooltip]="section.label"
        [style.--item-color]="section.color"
        [style.--delay]="i * 0.1 + 's'"
      >
        <div class="nav-icon">
          @if (section.isGallery) {
            <svg
              class="nav-icon-svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
              <circle cx="9" cy="9" r="2" />
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
            </svg>
          } @else {
            <img [src]="section.icon" [alt]="section.label" class="nav-icon-image" />
          }
        </div>
        <div class="nav-label">{{ section.label }}</div>
        <div class="nav-glow"></div>
      </a>
    }
  </div>
</nav>
